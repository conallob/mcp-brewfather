version: 2

project_name: mcp-brewfather

before:
  hooks:
    - go mod tidy

builds:
  - id: mcp-brewfather
    main: ./cmd/mcp-brewfather
    binary: mcp-brewfather
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

dockers:
  - id: linux-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/conallob/mcp-brewfather:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
  - id: linux-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/conallob/mcp-brewfather:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/conallob/mcp-brewfather:{{ .Tag }}"
    image_templates:
      - "ghcr.io/conallob/mcp-brewfather:{{ .Tag }}-amd64"
      - "ghcr.io/conallob/mcp-brewfather:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/conallob/mcp-brewfather:latest"
    image_templates:
      - "ghcr.io/conallob/mcp-brewfather:{{ .Tag }}-amd64"
      - "ghcr.io/conallob/mcp-brewfather:{{ .Tag }}-arm64"

brews:
  - name: mcp-brewfather
    homepage: "https://github.com/conallob/mcp-brewfather"
    description: "MCP server for the Brewfather homebrewing API"
    license: "MIT"
    folder: Formula
    repository:
      owner: conallob
      name: homebrew-taps
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    install: |
      bin.install "mcp-brewfather"
    test: |
      system "#{bin}/mcp-brewfather", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
