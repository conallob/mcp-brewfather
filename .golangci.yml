version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gocritic
    - misspell
    - revive
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck

issues:
  max-same-issues: 0
